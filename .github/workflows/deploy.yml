nano deploy.yml
cat > .github/workflows/deploy.yml << 'EOF'
name: Build and Deploy to OpenShift

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install oc CLI
      run: |
        curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o oc.tar.gz
        tar -xzf oc.tar.gz
        sudo mv oc /usr/local/bin/

    - name: Login to OpenShift
      run: |
        oc login --token=${{ secrets.OCP_TOKEN }} --server=${{ secrets.OCP_SERVER }} --insecure-skip-tls-verify=true

    - name: Deploy to OpenShift
      run: |
        oc project ${{ secrets.OCP_NAMESPACE }}
        oc new-app . --name=ocp-cicd-demo --strategy=docker || true
        oc start-build ocp-cicd-demo --from-dir=. --follow
        oc rollout status deployment/ocp-cicd-demo
        oc expose svc/ocp-cicd-demo || true
